<!DOCTYPE html>
<html>
<head>
<title>Submit Mod</title>
<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
background:#111;
color:white;
border:none;
}

button{
padding:10px;
background:#00ff88;
border:none;
}
</style>
</head>

<body>

<h1>Submit Your Mod</h1>

<form action="https://formspree.io/f/yourcode" method="POST">
<input type="text" name="Game Name" placeholder="Game name" required>

<textarea name="Description" placeholder="Description"></textarea>

<input type="text" name="Download Link" placeholder="Download link" required>

<button type="submit">Submit</button>
</form>

</body>
</html>
